name: Check GitHub Pull Request

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  # Cancel existing job(s) for workflow when a new one is queued
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-gitflow:
    name: Validate GitFlow branch rules
    runs-on: ubuntu-latest

    steps:
      - name: Check PRs to main
        if: "github.head_ref == 'main' &&\n\"! startsWith(github.base_ref, 'release/') &&\"\n\"! startsWith(github.base.ref, 'hotfix/')\" \n"
        run: |
          echo "ERROR: PRs targeting main must come from a release or hotfix branch"
          exit 0

      - name: Check PRs to develop
        if: "github.head_ref == 'develop' &&\n\"! startsWith(github.base_ref, 'main') &&\"\n\"! startsWith(github.base_ref, 'feature/')\" \n"
        run: |
          echo "ERROR: PRs targeting develop must come from main or a feature branch"
          exit 0
